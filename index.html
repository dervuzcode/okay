<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OKAY · Glass</title>
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
        }

        body {
            background: #f2f2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        /* Темная тема */
        body.dark-theme {
            background: #000000;
        }

        /* Основной контейнер с эффектом стекла */
        .phone-frame {
            width: 100%;
            max-width: 390px;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 14px 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(0, 0, 0, 0.05);
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .phone-frame {
            background: rgba(0, 0, 0, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Контейнер для анимаций */
        #animations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* Статус бар */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 16px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.02em;
            opacity: 0;
            transform: translateY(-10px);
            animation: slideDown 0.4s ease forwards;
        }

        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        .okay-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            color: #000000;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        body.dark-theme .okay-badge {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .time {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #000000;
            font-size: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        body.dark-theme .time {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Баланс */
        .balance-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 20px;
            border-radius: 36px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transform: translateY(0);
            opacity: 0;
            animation: fadeInUp 0.5s ease 0.1s forwards;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .balance-card {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #000000;
            font-weight: 600;
            font-size: 17px;
        }

        body.dark-theme .balance-label {
            color: #ffffff;
        }

        .balance-amount {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #ffffff;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 24px;
            color: #000000;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .balance-amount {
            background: #1c1c1e;
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .balance-amount.pop {
            transform: scale(1.05);
            background: #e5e5ea;
        }

        body.dark-theme .balance-amount.pop {
            background: #2c2c2e;
        }

        /* Профиль */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 16px 18px;
            border-radius: 36px;
            margin-bottom: 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 0;
            animation: fadeInUp 0.5s ease 0.2s forwards;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .profile-card {
            background: rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .profile-card:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.9);
        }

        body.dark-theme .profile-card:active {
            background: rgba(0, 0, 0, 0.7);
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.8);
            transition: border-color 0.2s ease;
        }

        body.dark-theme .avatar {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .avatar-placeholder {
            font-size: 28px;
            color: #000000;
        }

        body.dark-theme .avatar-placeholder {
            color: #ffffff;
        }

        .profile-info {
            flex: 1;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
        }

        body.dark-theme .profile-name {
            color: #ffffff;
        }

        .username {
            font-size: 14px;
            color: #8e8e93;
        }

        .badge {
            background: rgba(0, 0, 0, 0.05);
            color: #000000;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.dark-theme .badge {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .badge.premium {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
        }

        body.dark-theme .badge.premium {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Карточки контента */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 18px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            transform: translateY(0);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 0;
            animation: fadeInUp 0.5s ease 0.3s forwards;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .glass-card {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
        }

        /* Вкладки квестов */
        .quests-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }

        .tab {
            flex: 1;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 12px 8px;
            border-radius: 34px;
            font-weight: 600;
            font-size: 15px;
            color: #8e8e93;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }

        body.dark-theme .tab {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #98989e;
        }

        .tab.active {
            background: #000000;
            color: #ffffff;
            border-color: #000000;
            transform: scale(1.02);
        }

        body.dark-theme .tab.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Элементы квестов */
        .quest-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 14px 16px;
            border-radius: 28px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
        }

        body.dark-theme .quest-item {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .quest-item:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.7);
        }

        body.dark-theme .quest-item:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .quest-info {
            font-size: 14px;
            color: #000000;
            font-weight: 500;
        }

        body.dark-theme .quest-info {
            color: #ffffff;
        }

        .quest-reward {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .quest-btn {
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 32px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1);
            min-width: 90px;
        }

        body.dark-theme .quest-btn {
            background: #1c1c1e;
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .quest-btn:not(.completed):active {
            transform: scale(0.92);
            background: #000000;
            color: #ffffff;
        }

        body.dark-theme .quest-btn:not(.completed):active {
            background: #ffffff;
            color: #000000;
        }

        .quest-btn.completed {
            background: rgba(0, 0, 0, 0.05);
            color: #8e8e93;
            border-color: rgba(0, 0, 0, 0.05);
            pointer-events: none;
        }

        body.dark-theme .quest-btn.completed {
            background: rgba(255, 255, 255, 0.1);
            color: #98989e;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .quest-btn.checking {
            background: #8e8e93;
            color: #ffffff;
            pointer-events: none;
        }

        /* Таймер */
        .reset-timer {
            text-align: center;
            margin-top: 16px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 28px;
            color: #8e8e93;
            font-size: 13px;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.dark-theme .reset-timer {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #98989e;
        }

        /* Сетка статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 16px 4px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        body.dark-theme .stat-item {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-item:hover {
            transform: translateY(-2px);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 4px;
        }

        body.dark-theme .stat-value {
            color: #ffffff;
        }

        .stat-label {
            font-size: 11px;
            color: #8e8e93;
        }

        /* Прогресс бар */
        .progress-container {
            margin: 20px 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #8e8e93;
            margin-bottom: 8px;
        }

        .progress-bg {
            background: rgba(0, 0, 0, 0.1);
            height: 8px;
            border-radius: 20px;
            overflow: hidden;
        }

        body.dark-theme .progress-bg {
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: #000000;
            border-radius: 20px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        body.dark-theme .progress-fill {
            background: #ffffff;
        }

        /* Premium карточка */
        .premium-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 24px 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s ease;
        }

        body.dark-theme .premium-card {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.5));
            border-color: rgba(255, 255, 255, 0.2);
        }

        .premium-badge {
            background: #000000;
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 16px;
        }

        body.dark-theme .premium-badge {
            background: #ffffff;
            color: #000000;
        }

        .premium-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 26px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
        }

        body.dark-theme .premium-feature {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .premium-price {
            font-size: 36px;
            font-weight: 800;
            margin: 20px 0;
            color: #000000;
        }

        body.dark-theme .premium-price {
            color: #ffffff;
        }

        .premium-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            border-radius: 46px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        body.dark-theme .premium-btn {
            background: #ffffff;
            color: #000000;
        }

        .premium-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .premium-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* Вывод средств */
        .withdraw-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 36px;
            padding: 24px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        body.dark-theme .withdraw-card {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .withdraw-amount {
            font-size: 52px;
            font-weight: 800;
            margin: 20px 0;
            color: #000000;
        }

        body.dark-theme .withdraw-amount {
            color: #ffffff;
        }

        .withdraw-min {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 24px;
        }

        .withdraw-input {
            width: 100%;
            padding: 18px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 40px;
            font-size: 20px;
            text-align: center;
            margin-bottom: 16px;
            color: #000000;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        body.dark-theme .withdraw-input {
            background: #1c1c1e;
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .withdraw-input:focus {
            outline: none;
            border-color: #000000;
            transform: scale(1.02);
        }

        body.dark-theme .withdraw-input:focus {
            border-color: #ffffff;
        }

        .withdraw-btn {
            background: #000000;
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 46px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1);
            margin-bottom: 20px;
        }

        body.dark-theme .withdraw-btn {
            background: #ffffff;
            color: #000000;
        }

        .withdraw-btn:not(:disabled):active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .withdraw-btn:disabled {
            background: #e5e5ea;
            color: #8e8e93;
            pointer-events: none;
        }

        body.dark-theme .withdraw-btn:disabled {
            background: #2c2c2e;
            color: #8e8e93;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            color: #000000;
            font-size: 13px;
        }

        body.dark-theme .history-item {
            border-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: auto;
            padding: 8px 6px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 44px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            gap: 4px;
            position: sticky;
            bottom: 10px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease 0.4s forwards;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        body.dark-theme .bottom-nav {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 0;
            border-radius: 36px;
            cursor: pointer;
            color: #8e8e93;
            font-size: 11px;
            background: transparent;
            border: none;
            flex: 1;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        body.dark-theme .nav-item {
            color: #98989e;
        }

        .nav-item.active {
            color: #000000;
            background: rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        body.dark-theme .nav-item.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item:active {
            transform: scale(0.92);
        }

        .nav-item span:first-child {
            font-size: 22px;
            margin-bottom: 2px;
        }

        /* Анимация звезд */
        .star-particle {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-size: 28px;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.3));
            animation: starFloat 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            --x: 0px;
            --y: 0px;
        }

        body.dark-theme .star-particle {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        @keyframes starFloat {
            0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
            30% { opacity: 1; transform: translate(calc(var(--x)*0.3), calc(var(--y)*0.3 - 30px)) scale(1.2) rotate(10deg); }
            70% { opacity: 0.8; transform: translate(calc(var(--x)*0.7), calc(var(--y)*0.7 - 50px)) scale(1.1) rotate(-5deg); }
            100% { opacity: 0; transform: translate(var(--x), calc(var(--y) - 70px)) scale(0.8) rotate(0deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body class="light-theme">
    <div id="animations"></div>
    <div class="phone-frame" id="app">
        <!-- Статус бар -->
        <div class="status-bar">
            <div class="okay-badge">⚡️ OKAY</div>
            <div class="time" id="currentTime">15:30</div>
        </div>

        <!-- Баланс -->
        <div class="balance-card">
            <div class="balance-label">💰 Баланс</div>
            <div class="balance-amount" id="balanceAmount">
                <span id="starBalance">0</span>⭐️
            </div>
        </div>

        <!-- Профиль -->
        <div class="profile-card" id="profileHeader">
            <div class="avatar">
                <div class="avatar-placeholder" id="avatarPlaceholder">👤</div>
                <img id="avatarImage" src="" alt="" style="display:none; width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="profile-info">
                <div class="name-row">
                    <span class="profile-name" id="userName">Загрузка...</span>
                    <span class="badge" id="userBadge">MEMBER</span>
                </div>
                <div class="username" id="userUsername">@loading</div>
            </div>
        </div>

        <!-- Контент -->
        <div id="contentArea"></div>

        <!-- Навигация -->
        <div class="bottom-nav">
            <button class="nav-item active" id="navQuests"><span>📋</span><span>Квесты</span></button>
            <button class="nav-item" id="navProfile"><span>👤</span><span>Профиль</span></button>
            <button class="nav-item" id="navPremium"><span>💎</span><span>Premium</span></button>
            <button class="nav-item" id="navWithdraw"><span>💸</span><span>Вывод</span></button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            'use strict';

            // Инициализация Telegram
            const tg = window.Telegram?.WebApp;
            const user = tg?.initDataUnsafe?.user || null;

            if (tg) {
                tg.expand();
                tg.ready();
                tg.disableVerticalSwipes?.();
                tg.setHeaderColor?.('#ffffff');
                tg.setBackgroundColor?.('#f2f2f7');
            }

            // ========== ДАННЫЕ ==========
            const DB_KEY = 'okay_glass_db';
            const STATE_KEY = 'okay_glass_state';
            const WITHDRAW_KEY = 'okay_withdraw_history';

            // База данных пользователей
            let database = { users: {}, totalUsers: 0 };
            try {
                const saved = localStorage.getItem(DB_KEY);
                if (saved) database = JSON.parse(saved);
            } catch(e){}
            if (!database.users) database.users = {};

            // Состояние пользователя
            const defaultState = {
                stars: 0,
                premium: false,
                dailyQuests: {},
                weeklyQuests: {},
                joinDate: new Date().toLocaleDateString('ru-RU'),
                lastDailyReset: new Date().toDateString(),
                lastWeeklyReset: getWeekNumber(new Date()),
                weeklyPremiumGift: null
            };

            let state = { ...defaultState };
            try {
                const saved = localStorage.getItem(STATE_KEY);
                if (saved) state = { ...defaultState, ...JSON.parse(saved) };
            } catch(e){}
            state.stars = state.stars || 0;

            // История выводов
            let withdrawHistory = [];
            try {
                const saved = localStorage.getItem(WITHDRAW_KEY);
                if (saved) withdrawHistory = JSON.parse(saved);
            } catch(e){}

            // Каналы для подписки
            const CHANNELS = {
                ok: '@OKAYPROJECT',
                friend: '@ufc_cuttings'
            };

            // ========== DOM ЭЛЕМЕНТЫ ==========
            const el = {
                contentArea: document.getElementById('contentArea'),
                starBalance: document.getElementById('starBalance'),
                balanceAmount: document.querySelector('.balance-amount'),
                avatarPlaceholder: document.getElementById('avatarPlaceholder'),
                avatarImage: document.getElementById('avatarImage'),
                userName: document.getElementById('userName'),
                userUsername: document.getElementById('userUsername'),
                userBadge: document.getElementById('userBadge'),
                animations: document.getElementById('animations'),
                currentTime: document.getElementById('currentTime'),
                profileHeader: document.getElementById('profileHeader')
            };

            // Навигация
            const nav = {
                quests: document.getElementById('navQuests'),
                profile: document.getElementById('navProfile'),
                premium: document.getElementById('navPremium'),
                withdraw: document.getElementById('navWithdraw')
            };

            // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========

            // Обновление времени
            function updateTime() {
                if (!el.currentTime) return;
                const now = new Date();
                el.currentTime.textContent = now.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            }
            updateTime();
            setInterval(updateTime, 1000);

            // Номер недели
            function getWeekNumber(d) {
                const date = new Date(d);
                date.setHours(0,0,0);
                date.setDate(date.getDate() + 4 - (date.getDay() || 7));
                const yearStart = new Date(date.getFullYear(), 0, 1);
                return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
            }

            // Тактильная обратная связь
            function vibrate(type = 'light') {
                if (tg?.HapticFeedback) {
                    if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
                    else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                    else tg.HapticFeedback.impactOccurred('light');
                }
            }

            // Анимация звезд
            function createStars(amount, element) {
                if (!element || !el.animations || !el.balanceAmount) return;

                try {
                    const src = element.getBoundingClientRect();
                    const srcX = src.left + src.width/2;
                    const srcY = src.top + src.height/2;

                    const tgt = el.balanceAmount.getBoundingClientRect();
                    const tgtX = tgt.left + tgt.width/2;
                    const tgtY = tgt.top + tgt.height/2;

                    const dx = tgtX - srcX;
                    const dy = tgtY - srcY;

                    const count = Math.min(8, Math.floor(amount / 2) + 3);

                    for (let i = 0; i < count; i++) {
                        setTimeout(() => {
                            const star = document.createElement('div');
                            star.className = 'star-particle';
                            star.innerHTML = '⭐️';
                            star.style.left = (srcX + (Math.random() - 0.5) * 50) + 'px';
                            star.style.top = (srcY + (Math.random() - 0.5) * 50) + 'px';
                            star.style.setProperty('--x', (dx + (Math.random() - 0.5) * 40) + 'px');
                            star.style.setProperty('--y', (dy + (Math.random() - 0.5) * 40) + 'px');
                            el.animations.appendChild(star);
                            setTimeout(() => star.remove(), 1200);
                        }, i * 40);
                    }

                    el.balanceAmount.classList.add('pop');
                    setTimeout(() => el.balanceAmount.classList.remove('pop'), 300);
                    vibrate('success');
                } catch (e) {}
            }

            // Сохранение данных
            function saveAll() {
                try {
                    localStorage.setItem(STATE_KEY, JSON.stringify(state));

                    if (user?.id) {
                        database.users[user.id] = {
                            id: user.id,
                            name: `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'User',
                            username: user.username || `user_${user.id}`,
                            avatar: user.photo_url || null,
                            stars: state.stars,
                            premium: state.premium || false,
                            joinDate: state.joinDate
                        };
                        database.totalUsers = Object.keys(database.users).length;
                        localStorage.setItem(DB_KEY, JSON.stringify(database));
                    }

                    localStorage.setItem(WITHDRAW_KEY, JSON.stringify(withdrawHistory));

                    if (el.starBalance) el.starBalance.textContent = state.stars;
                    if (el.userBadge) {
                        el.userBadge.className = `badge ${state.premium ? 'premium' : ''}`;
                        el.userBadge.textContent = state.premium ? 'PREMIUM' : 'MEMBER';
                    }
                } catch (e) {}
            }

            // Уведомление
            function notify(title, message) {
                vibrate('success');
                alert(`${title}\n${message}`);
            }

            // Проверка подписки
            async function checkSubscription(channel) {
                if (!user?.id) return false;

                try {
                    vibrate();
                    tg?.openTelegramLink(`https://t.me/${channel.replace('@', '')}`);

                    return new Promise((resolve) => {
                        setTimeout(() => {
                            if (confirm('Подписались на канал?')) {
                                resolve(true);
                            } else {
                                resolve(false);
                            }
                        }, 1000);
                    });
                } catch (e) {
                    return false;
                }
            }

            // Покупка Premium за Telegram Stars
            async function buyPremium() {
                if (!tg) {
                    notify('❌ Ошибка', 'Telegram WebApp не доступен');
                    return;
                }

                try {
                    vibrate();

                    const btn = document.getElementById('buyPremiumBtn');
                    if (btn) {
                        btn.classList.add('loading');
                        btn.textContent = '⏳ Обработка...';
                    }

                    // Эмуляция успешной покупки
                    setTimeout(() => {
                        if (state.stars >= 100) {
                            state.stars -= 100;
                            state.premium = true;
                            saveAll();

                            if (btn) {
                                btn.classList.remove('loading');
                            }

                            notify('🎉 Premium активирован', 'Добро пожаловать в элитный клуб!');
                            renderPremium();
                            vibrate('success');
                        } else {
                            notify('❌ Ошибка', 'Недостаточно звёзд');
                            if (btn) {
                                btn.classList.remove('loading');
                                btn.textContent = 'Купить Premium за 100⭐';
                            }
                        }
                    }, 1500);

                } catch (e) {
                    console.error('Purchase error:', e);
                    notify('❌ Ошибка', 'Не удалось совершить покупку');

                    const btn = document.getElementById('buyPremiumBtn');
                    if (btn) {
                        btn.classList.remove('loading');
                        btn.textContent = 'Купить Premium за 100⭐';
                    }
                }
            }

            // ========== КВЕСТЫ ==========
            const dailyQuests = [
                { id: 'd1', title: 'Подпишись на наш канал', reward: 2, channel: CHANNELS.ok },
                { id: 'd2', title: 'Подпишись на нашего друга', reward: 2, channel: CHANNELS.friend },
                { id: 'd3', title: 'Вход в приложение', reward: 1 },
                { id: 'd4', title: 'Написать комментарий', reward: 1 },
                { id: 'd5', title: 'Поставить лайк', reward: 1 }
            ];

            const weeklyQuests = [
                { id: 'w1', title: '5 дней подряд', reward: 5 },
                { id: 'w2', title: '10 квестов', reward: 5 },
                { id: 'w3', title: '5 репостов', reward: 5 },
                { id: 'w4', title: 'Топ-10', reward: 10 },
                { id: 'w5', title: '500 звёзд', reward: 10 }
            ];

            async function completeQuest(btn, qid, type, reward) {
                const quest = [...dailyQuests, ...weeklyQuests].find(x => x.id === qid);

                if (quest?.channel) {
                    btn.classList.add('checking');
                    btn.textContent = '⏳';

                    const subscribed = await checkSubscription(quest.channel);

                    btn.classList.remove('checking');

                    if (!subscribed) {
                        btn.textContent = '❌';
                        setTimeout(() => {
                            btn.textContent = 'Взять';
                        }, 1500);
                        return;
                    }
                }

                btn.textContent = '⏳';

                setTimeout(() => {
                    let finalReward = reward;
                    if (state.premium) finalReward = reward * 2; // x2 для premium

                    state.stars += finalReward;

                    if (type === 'daily') {
                        if (!state.dailyQuests) state.dailyQuests = {};
                        state.dailyQuests[qid] = true;
                    } else {
                        if (!state.weeklyQuests) state.weeklyQuests = {};
                        state.weeklyQuests[qid] = true;
                    }

                    createStars(finalReward, btn);
                    notify('✅ +' + finalReward + '⭐', quest?.title || 'Квест выполнен');
                    saveAll();
                    renderQuests();
                }, 400);
            }

            function renderQuests() {
                const today = new Date().toDateString();
                if (state.lastDailyReset !== today) {
                    state.dailyQuests = {};
                    state.lastDailyReset = today;
                }

                const week = getWeekNumber(new Date());
                if (state.lastWeeklyReset !== week) {
                    state.weeklyQuests = {};
                    state.lastWeeklyReset = week;
                }

                const now = new Date();
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(0, 0, 0, 0);

                const left = tomorrow - now;
                const hours = Math.floor(left / 3600000);
                const mins = Math.floor((left % 3600000) / 60000);

                let html = `
                    <div class="glass-card">
                        <div class="quests-tabs">
                            <button class="tab active" id="dailyTab">📅 Дневные</button>
                            <button class="tab" id="weeklyTab">📆 Недельные</button>
                        </div>

                        <div id="dailySection">
                `;

                dailyQuests.forEach(q => {
                    const done = state.dailyQuests?.[q.id];
                    const rewardMultiplier = state.premium ? ' (x2)' : '';
                    html += `
                        <div class="quest-item" data-quest="${q.id}" data-type="daily">
                            <div>
                                <div class="quest-info">${q.title}</div>
                                <div class="quest-reward">⭐️ +${q.reward}${rewardMultiplier}</div>
                            </div>
                            <button class="quest-btn ${done ? 'completed' : ''}" ${done ? 'disabled' : ''}>
                                ${done ? '✅' : 'Взять'}
                            </button>
                        </div>
                    `;
                });

                html += `
                        <div class="reset-timer">⏰ ${hours}ч ${mins}м</div>
                    </div>

                    <div id="weeklySection" class="hidden">
                `;

                weeklyQuests.forEach(q => {
                    const done = state.weeklyQuests?.[q.id];
                    const rewardMultiplier = state.premium ? ' (x2)' : '';
                    html += `
                        <div class="quest-item" data-quest="${q.id}" data-type="weekly">
                            <div>
                                <div class="quest-info">${q.title}</div>
                                <div class="quest-reward">⭐️ +${q.reward}${rewardMultiplier}</div>
                            </div>
                            <button class="quest-btn ${done ? 'completed' : ''}" ${done ? 'disabled' : ''}>
                                ${done ? '✅' : 'Взять'}
                            </button>
                        </div>
                    `;
                });

                html += `
                        <div class="reset-timer">📆 Неделя ${week}</div>
                    </div>
                </div>
                `;

                el.contentArea.innerHTML = html;

                document.getElementById('dailyTab').onclick = () => {
                    document.getElementById('dailyTab').classList.add('active');
                    document.getElementById('weeklyTab').classList.remove('active');
                    document.getElementById('dailySection').classList.remove('hidden');
                    document.getElementById('weeklySection').classList.add('hidden');
                    vibrate();
                };

                document.getElementById('weeklyTab').onclick = () => {
                    document.getElementById('weeklyTab').classList.add('active');
                    document.getElementById('dailyTab').classList.remove('active');
                    document.getElementById('weeklySection').classList.remove('hidden');
                    document.getElementById('dailySection').classList.add('hidden');
                    vibrate();
                };

                document.querySelectorAll('.quest-item .quest-btn:not(.completed)').forEach(btn => {
                    btn.onclick = async (e) => {
                        e.stopPropagation();
                        const item = btn.closest('.quest-item');
                        const qid = item.dataset.quest;
                        const type = item.dataset.type;

                        if ((type === 'daily' && state.dailyQuests[qid]) ||
                            (type === 'weekly' && state.weeklyQuests[qid])) return;

                        const quest = [...dailyQuests, ...weeklyQuests].find(x => x.id === qid);
                        await completeQuest(btn, qid, type, quest?.reward || 1);
                    };
                });
            }

            // ========== ПРОФИЛЬ ==========
            function renderProfile() {
                const level = Math.floor(state.stars / 500) + 1;
                const progress = (state.stars % 500) / 500 * 100;
                const totalQuests = Object.values(state.dailyQuests || {}).filter(v => v).length +
                                   Object.values(state.weeklyQuests || {}).filter(v => v).length;

                const html = `
                    <div class="glass-card">
                        <div style="display:flex; gap:16px; align-items:center; margin-bottom:20px;">
                            <div class="avatar" style="width:64px; height:64px;">
                                ${user?.photo_url ?
                                    `<img src="${user.photo_url}" style="width:100%;height:100%;border-radius:50%;">` :
                                    '<div class="avatar-placeholder" style="font-size:32px;">👤</div>'}
                            </div>
                            <div>
                                <div style="font-size:20px; font-weight:700; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">${user?.first_name || 'OKAY'} ${user?.last_name || ''}</div>
                                <div style="color:#8e8e93; font-size:13px;">@${user?.username || 'user'}</div>
                                <div style="color:#8e8e93; font-size:11px;">с ${state.joinDate}</div>
                            </div>
                        </div>

                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-value">${state.stars}</div>
                                <div class="stat-label">⭐️ Звёзд</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${level}</div>
                                <div class="stat-label">Уровень</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${database.totalUsers}</div>
                                <div class="stat-label">Всего</div>
                            </div>
                        </div>

                        <div class="progress-container">
                            <div class="progress-header">
                                <span>До уровня ${level + 1}</span>
                                <span>${state.stars % 500}/500</span>
                            </div>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width:${progress}%"></div>
                            </div>
                        </div>

                        <div style="background:rgba(0,0,0,0.02); border-radius:24px; padding:16px; ${document.body.classList.contains('dark-theme') ? 'background:rgba(255,255,255,0.05);' : ''}">
                            <div style="font-weight:600; margin-bottom:10px; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">📊 Статистика</div>
                            <div style="display:flex; justify-content:space-between; color:#8e8e93; font-size:13px; margin-bottom:6px;">
                                <span>Выполнено квестов:</span>
                                <span>${totalQuests}</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; color:#8e8e93; font-size:13px;">
                                <span>Премиум статус:</span>
                                <span>${state.premium ? '✅ Активен (x2)' : '❌ Нет'}</span>
                            </div>
                        </div>
                    </div>
                `;

                el.contentArea.innerHTML = html;
            }

            // ========== PREMIUM ==========
            function renderPremium() {
                if (state.premium) {
                    const currentWeek = getWeekNumber(new Date());
                    if (state.weeklyPremiumGift !== currentWeek) {
                        state.stars += 50;
                        state.weeklyPremiumGift = currentWeek;
                        saveAll();
                    }
                }

                const html = `
                    <div class="glass-card">
                        <div class="premium-card">
                            <div class="premium-badge">💎 PREMIUM</div>

                            <div style="font-size:18px; margin:16px 0; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">
                                ${state.premium ? 'Статус активен' : 'Эксклюзивные преимущества'}
                            </div>

                            <div class="premium-feature">
                                <span>🚀</span>
                                <span style="flex:1;">Квесты дают x2 награды</span>
                            </div>
                            <div class="premium-feature">
                                <span>💎</span>
                                <span style="flex:1;">Эксклюзивный значок</span>
                            </div>
                            <div class="premium-feature">
                                <span>🎁</span>
                                <span style="flex:1;">50⭐ каждую неделю</span>
                            </div>

                            ${!state.premium ? `
                                <div class="premium-price">100 ⭐️</div>
                                <button class="premium-btn" id="buyPremiumBtn">
                                    Купить Premium за 100⭐
                                </button>
                                <p style="color:#8e8e93; font-size:11px; margin-top:12px;">
                                    Оплата реальными Telegram Stars
                                </p>
                            ` : `
                                <div style="background:rgba(0,0,0,0.02); border-radius:24px; padding:16px; margin-top:16px; ${document.body.classList.contains('dark-theme') ? 'background:rgba(255,255,255,0.05);' : ''}">
                                    <div style="font-size:16px; margin-bottom:8px; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">✅ Premium активен</div>
                                    <div style="color:#8e8e93; font-size:12px;">
                                        Недельный бонус: ${state.weeklyPremiumGift === getWeekNumber(new Date()) ? 'получен' : 'ожидает'}
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                `;

                el.contentArea.innerHTML = html;

                if (!state.premium) {
                    document.getElementById('buyPremiumBtn').onclick = buyPremium;
                }
            }

            // ========== ВЫВОД ==========
            function renderWithdraw() {
                const minWithdraw = 50;
                const canWithdraw = state.stars >= minWithdraw;

                const html = `
                    <div class="glass-card">
                        <div class="withdraw-card">
                            <h3 style="font-size:20px; margin-bottom:8px; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">💸 Вывод средств</h3>

                            <div class="withdraw-amount">
                                ${state.stars} ⭐️
                            </div>

                            <div class="withdraw-min">
                                Мин. сумма: ${minWithdraw} ⭐️
                            </div>

                            <input type="number" id="withdrawAmount" class="withdraw-input"
                                   placeholder="Сумма" min="${minWithdraw}" max="${state.stars}"
                                   value="${Math.min(minWithdraw, state.stars)}">

                            <button class="withdraw-btn" id="withdrawBtn" ${!canWithdraw ? 'disabled' : ''}>
                                ${canWithdraw ? 'Вывести' : 'Недостаточно звёзд'}
                            </button>

                            <div style="margin-top:24px;">
                                <h4 style="font-size:16px; margin-bottom:12px; text-align:left; color:#000000; ${document.body.classList.contains('dark-theme') ? 'color:#ffffff;' : ''}">📜 История</h4>
                                ${withdrawHistory.slice(0, 5).map(h => `
                                    <div class="history-item">
                                        <span>${h.date}</span>
                                        <span>${h.amount}⭐️</span>
                                        <span style="color:${h.status === 'выполнен' ? '#34c759' : '#ffcc00'}">${h.status}</span>
                                    </div>
                                `).join('')}
                                ${withdrawHistory.length === 0 ?
                                    '<div style="color:#8e8e93; padding:16px; text-align:center;">Нет операций</div>' : ''}
                            </div>
                        </div>
                    </div>
                `;

                el.contentArea.innerHTML = html;

                document.getElementById('withdrawBtn')?.addEventListener('click', () => {
                    const amount = parseInt(document.getElementById('withdrawAmount').value);

                    if (amount < minWithdraw) {
                        notify('❌ Ошибка', `Минимум ${minWithdraw}⭐️`);
                        return;
                    }

                    if (amount > state.stars) {
                        notify('❌ Ошибка', 'Недостаточно звёзд');
                        return;
                    }

                    if (confirm(`Вывести ${amount}⭐️?`)) {
                        state.stars -= amount;

                        withdrawHistory.unshift({
                            date: new Date().toLocaleDateString(),
                            amount: amount,
                            status: 'в обработке'
                        });

                        if (withdrawHistory.length > 20) withdrawHistory.pop();

                        saveAll();
                        notify('✅ Заявка создана', `Вывод ${amount}⭐️ обрабатывается`);
                        renderWithdraw();
                        vibrate('success');
                    }
                });
            }

            // ========== НАВИГАЦИЯ ==========
            function setActive(activeId) {
                Object.values(nav).forEach(b => b?.classList.remove('active'));
                nav[activeId]?.classList.add('active');
                vibrate();

                switch(activeId) {
                    case 'quests': renderQuests(); break;
                    case 'profile': renderProfile(); break;
                    case 'premium': renderPremium(); break;
                    case 'withdraw': renderWithdraw(); break;
                }
            }

            nav.quests.onclick = () => setActive('quests');
            nav.profile.onclick = () => setActive('profile');
            nav.premium.onclick = () => setActive('premium');
            nav.withdraw.onclick = () => setActive('withdraw');
            el.profileHeader.onclick = () => setActive('profile');

            // ========== ИНИЦИАЛИЗАЦИЯ ==========
            function init() {
                // Обновление информации пользователя
                if (user) {
                    el.userName.textContent = `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'OKAY User';
                    el.userUsername.textContent = user.username ? '@' + user.username : '@user';

                    if (user.photo_url) {
                        el.avatarImage.src = user.photo_url;
                        el.avatarImage.style.display = 'block';
                        el.avatarPlaceholder.style.display = 'none';
                    }
                }

                // Применение темы Telegram
                document.body.className = tg?.colorScheme === 'dark' ? 'dark-theme' : 'light-theme';

                // Обновление бейджа
                el.userBadge.className = `badge ${state.premium ? 'premium' : ''}`;
                el.userBadge.textContent = state.premium ? 'PREMIUM' : 'MEMBER';

                // Баланс
                el.starBalance.textContent = state.stars;

                // Стартовый рендер
                renderQuests();
                saveAll();
            }

            init();

            // Автообновление квестов
            setInterval(() => {
                const today = new Date().toDateString();
                if (state.lastDailyReset !== today) {
                    notify('📅 Квесты обновлены', 'Новые задания!');
                    if (nav.quests.classList.contains('active')) renderQuests();
                }
            }, 60000);
        })();
    </script>
</body>
</html>
